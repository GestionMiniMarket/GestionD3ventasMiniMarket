name: MiniMarket Pro - Entrega Continua

on:
  push:
    branches: [ main ]

jobs:
  delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias de produccion del Backend
        run: |
          cd Backend
          npm install --production

      - name: Preparar despliegue
        run: |
          echo "Build de producción finalizado. Listo para despliegue en Railway."

  docker:
    runs-on: ubuntu-latest
    needs: delivery

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir y publicar imagen del Backend
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/minimarket-backend:latest

      - name: Construir y publicar imagen del Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: ${{ secrets.DOCKER_USERNAME }}/minimarket-frontend:latest
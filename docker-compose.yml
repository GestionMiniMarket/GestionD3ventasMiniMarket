services:
  database:
    image: mysql:8.0
    container_name: minimarket-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - minimarket-net
    healthcheck:                                   
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]   
      interval: 5s                                   
      timeout: 5s                                    
      retries: 10                                    

  backend:
    build: ./Backend
    container_name: minimarket-backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    ports:
      - "3000:3000"
    depends_on:                                      
      database:                                       
        condition: service_healthy                    
    networks:
      - minimarket-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: minimarket-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - minimarket-net

volumes:
  db_data:

networks:
  minimarket-net:
    driver: bridge